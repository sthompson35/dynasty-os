services:
  postgres:
    image: postgres:17
    container_name: dynasty_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dynasty_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: dynasty_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8010}:8000"
    volumes:
      - ./backend:/app/backend
      - ./ai_agents:/app/ai_agents:ro
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://postgres:postgres@postgres:5432/postgres}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379/0}

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: dynasty_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-3005}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL_DOCKER:-http://api:8000}
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://postgres:postgres@postgres:5432/postgres}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3005}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dynasty-propertyos-secret-change-in-prod}
      LLMSTUDIO_BASE_URL: ${LLMSTUDIO_BASE_URL_DOCKER:-http://host.docker.internal:1234}
      LLMSTUDIO_DEFAULT_MODEL: ${LLMSTUDIO_DEFAULT_MODEL:-}
      LLMSTUDIO_API_KEY: ${LLMSTUDIO_API_KEY:-}
      LLMSTUDIO_TIMEOUT_SECONDS: ${LLMSTUDIO_TIMEOUT_SECONDS:-5}

  n8n-sync:
    image: node:20-alpine
    container_name: dynasty_n8n_sync
    restart: "no"
    depends_on:
      api:
        condition: service_started
    environment:
      N8N_API_KEY: ${N8N_API_KEY}
      N8N_CLOUD_URL: ${N8N_CLOUD_URL:-https://ultimate-dynasty-os.app.n8n.cloud}
      N8N_WORKFLOW_ID: ${N8N_WORKFLOW_ID:-OEGkyufLk21eS6lz}
      N8N_WORKFLOW_ID_V3: ${N8N_WORKFLOW_ID_V3:-}
      # Priority 1: set this to the Railway API URL in production (skips ngrok entirely)
      N8N_DYNASTY_API_URL: ${N8N_DYNASTY_API_URL:-}
      # Reads tunnel URL from ngrok running on the host machine (local dev only)
      NGROK_API_URL: ${NGROK_API_URL:-http://host.docker.internal:4040/api/tunnels}
      # Optional: set to skip the ngrok API lookup and use a known static domain
      NGROK_DOMAIN: ${NGROK_DOMAIN:-}
    volumes:
      - ./scripts:/scripts:ro
    command: node /scripts/sync-n8n.js

  n8n:
    image: n8nio/n8n:1.98.2
    container_name: dynasty_n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-postgres}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-postgres}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      NODE_ENV: production
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      N8N_DYNASTY_API_URL: ${N8N_DYNASTY_API_URL_DOCKER:-http://api:8000}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-UTC}
    volumes:
      - n8n_data:/home/node/.n8n

  ai_worker:
    build:
      context: .
      dockerfile: docker/ai_worker/Dockerfile
    container_name: dynasty_ai_worker
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    env_file:
      - .env
    environment:
      AI_WORKER_INTERVAL_SECONDS: ${AI_WORKER_INTERVAL_SECONDS:-60}
      LLMSTUDIO_BASE_URL: ${LLMSTUDIO_BASE_URL_DOCKER:-http://host.docker.internal:1234}
      LLMSTUDIO_TIMEOUT_SECONDS: ${LLMSTUDIO_TIMEOUT_SECONDS:-5}
    volumes:
      - ./scripts:/app/scripts
      - ./ai_agents:/app/ai_agents

  blender_worker:
    build:
      context: .
      dockerfile: docker/blender_worker/Dockerfile
    container_name: dynasty_blender_worker
    restart: unless-stopped
    environment:
      BLENDER_WORKER_INTERVAL_SECONDS: ${BLENDER_WORKER_INTERVAL_SECONDS:-60}
      BLENDER_RUN_ON_START: ${BLENDER_RUN_ON_START:-false}
      BLENDER_TRIGGER_FILE: ${BLENDER_TRIGGER_FILE:-storage/blender_jobs/run.flag}
      BLENDER_PATH: ${BLENDER_PATH_DOCKER:-blender}
    volumes:
      - ./scripts:/app/scripts
      - ./blender:/app/blender
      - ./frontend:/app/frontend
      - ./storage:/app/storage

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  frontend_node_modules:
